<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RICE &ndash; Pre-Order</title>
  <meta name="description" content="RICE is a literary magazine of essays, fiction, poetry, and archival work from the Gulf South.">
  <meta name="theme-color" content="#171008">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <script src="site.js" defer></script>
</head>
<body class="splash">
  <video class="splash-video" autoplay muted loop playsinline preload="metadata" poster="images/rice_field.png" aria-hidden="true">
    <source src="images/rice-field-loop.mp4" type="video/mp4">
  </video>
  <main class="splash-container">
    <div class="splash-mark">
      <p class="splash-publisher">St. Expedite Press</p>
      <h1 class="splash-logo" aria-label="RICE">
        <svg class="splash-logo-ring" viewBox="0 0 320 176" aria-hidden="true">
          <ellipse class="neon-ring-base" cx="160" cy="88" rx="150" ry="76"></ellipse>
          <path class="neon-ring-part ring-part-one" d="M 10 88 A 150 76 0 0 1 160 12"></path>
          <path class="neon-ring-part ring-part-two" d="M 160 12 A 150 76 0 0 1 310 88"></path>
          <path class="neon-ring-part ring-part-three" d="M 310 88 A 150 76 0 0 1 160 164"></path>
          <path class="neon-ring-part ring-part-four" d="M 160 164 A 150 76 0 0 1 10 88"></path>
        </svg>
        <span class="splash-logo-letters" aria-hidden="true">
          <span class="neon-letter letter-r">R</span>
          <span class="neon-letter letter-i">I</span>
          <span class="neon-letter letter-c">C</span>
          <span class="neon-letter letter-e">E</span>
        </span>
      </h1>
    </div>
    <p class="splash-tagline">29.9511&deg; N, 90.0715&deg; W</p>
    <div class="splash-actions">
      <a href="shop.html" class="splash-btn">Pre-Order</a>
      <a href="submissions.html" class="splash-btn secondary">Submit</a>
    </div>
    <form class="splash-signup signup-form">
      <label class="visually-hidden" for="splash-email">Email address</label>
      <div class="splash-signup-row">
        <input id="splash-email" name="email" type="email" autocomplete="email" placeholder="EMAIL ADDRESS" required>
        <button type="submit">Sign Up</button>
      </div>
      <p class="form-status" aria-live="polite"></p>
    </form>
  </main>
</body>
</html>
